<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      var repo = '/portfolio';
      if (path.startsWith(repo)) {
        var newPath = path.replace(repo, '');
        window.location.replace(repo + '/#' + newPath);
      }
    </script>
  </head>
</html>
